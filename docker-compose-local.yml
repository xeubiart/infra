# It should be only used for a local sanity check

name: xeubiart-local

services:
  # --- DATABASE ---
  db:
    image: postgres:15-alpine
    container_name: xeubiart-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - xeubiart-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-xeubiart}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- SPRING BACKEND ---
  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      - ENV_MODE=prod
      - SPRING_PROFILES_ACTIVE=prod
      - ENABLE_EMAILS=true
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - xeubiart-network

  # --- MCP SERVER ---
  mcp:
    build:
      context: ../mcp
      dockerfile: Dockerfile
    container_name: mcp
    environment:
      - BACKEND_URL=http://backend:8080
      - PORT=5001
    networks: 
      - xeubiart-network
    depends_on:
      - backend

  # --- GO WEBSITE ---
  website:
    build:
      context: ../website
      dockerfile: Dockerfile
    container_name: website
    environment:
      - ENV_MODE=prod
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - xeubiart-network

  # --- CADDY (Local Proxy) ---
  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./.well-known:/var/www/well-known
      - caddy_data:/data
      - caddy_config:/config 
    networks: 
      - xeubiart-network
    depends_on:
      - backend
      - website
      - mcp

networks:
  xeubiart-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config: