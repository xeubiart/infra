syntax = "proto3";

package userInfo;

import "google/protobuf/empty.proto";

option go_package = "./proto";
option java_multiple_files = true;
option java_package = "com.xeubiart.proto";

service UserInfo {
  rpc GetUsername(google.protobuf.Empty) returns (GetUsernameOutput);
  rpc IsAdmin(google.protobuf.Empty) returns (IsAdminOutput);
}

message GetUsernameOutput {
  string username = 1;
}

message IsAdminOutput {
  bool isAdmin = 1;
}
