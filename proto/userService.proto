syntax = "proto3";

import "google/protobuf/empty.proto";

option java_package = "com.xeubiart.proto";
option java_multiple_files = true;
option go_package = "./proto";

package userInfo;

service UserInfo {
  rpc GetUsername (google.protobuf.Empty) returns (GetUsernameOutput);
  rpc HasProposal (google.protobuf.Empty) returns (HasProposalOutput);
}

message GetUsernameOutput {
  string username = 1;
}

message HasProposalOutput {
  bool hasProposal = 1;
}