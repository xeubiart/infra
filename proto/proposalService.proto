syntax = "proto3";

package proposalInfo;

import "google/protobuf/empty.proto";

option go_package = "./proto";
option java_multiple_files = true;
option java_package = "com.xeubiart.proto";

service ProposalInfo {
  rpc HasProposal(google.protobuf.Empty) returns (HasProposalOutput);
  rpc GetProposal(google.protobuf.Empty) returns (GetProposalOutput);
}

message HasProposalOutput {
  bool hasProposal = 1;
}

message GetProposalOutput {
  bool found = 1;
  int32 remainingSeconds = 2;
  string style = 3;
  int32 size = 4;
  int32 duration = 5;
  string description = 6;
}
